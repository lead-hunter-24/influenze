name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'setup-gcp.sh'
      - 'generate_channel_data.py'
  workflow_dispatch: {}

env:
  SERVICE: yt-insights
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      # Authenticate to Google Cloud via Workload Identity Federation (no JSON keys)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      # Build from source (Cloud Build) and deploy to Cloud Run.
      # ANTHROPIC_API_KEY is read from a Secret Manager secret named "anthropic-api-key".
      - name: Deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "$REGION" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --port 8080 \
            --set-secrets "ANTHROPIC_API_KEY=anthropic-api-key:latest"

      - name: Show URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format='value(status.url)'
